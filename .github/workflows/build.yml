name: Build BlockAds.dylib

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # 列出可用 Xcode 版本并选择最新的
          ls /Applications/ | grep Xcode
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE"
          sudo xcode-select -s "$XCODE"

      - name: Build dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "Using SDK: $SDK"

          xcrun -sdk iphoneos clang \
            -arch arm64 -arch arm64e \
            -dynamiclib \
            -o BlockAds.dylib \
            -framework UIKit \
            -framework Foundation \
            -framework WebKit \
            -isysroot "$SDK" \
            -miphoneos-version-min=15.0 \
            -fobjc-arc \
            -O2 \
            BlockAds.m

          echo "=== Build info ==="
          file BlockAds.dylib
          ls -lh BlockAds.dylib

      - name: Ad-hoc sign
        run: codesign -f -s - BlockAds.dylib

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: BlockAds.dylib
          path: BlockAds.dylib
